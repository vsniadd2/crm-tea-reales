# Tea CRM — запуск на сервере (93.125.82.249)
#
# ДАННЫЕ БД СОХРАНЯЮТСЯ при:
#   docker compose down
#   docker compose stop
#   git pull + docker compose up -d --build
#
# Данные удаляются ТОЛЬКО при явном:
#   docker compose down -v          ← НИКОГДА не используйте -v на проде!
#   docker volume rm tea_crm_postgres_data
#
# Volume хранится на диске сервера отдельно от контейнеров.

volumes:
  postgres_data:
    name: tea_crm_postgres_data

services:
  postgres:
    image: postgres:15
    container_name: tea_crm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-tea_crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tea_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-tea_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tea_crm_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      DB_NAME: ${POSTGRES_DB:-tea_crm}
      JWT_SECRET: ${JWT_SECRET:?Задайте JWT_SECRET в .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Только localhost — для Vite dev (npm run dev) на хосте; снаружи сервера не доступен
      - "127.0.0.1:${BACKEND_PORT:-3001}:3000"
    networks:
      - tea_network
    volumes:
      # Только для импорта CSV (seed-prod.js читает /repo/)
      - .:/repo:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tea_crm_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - tea_network

networks:
  tea_network:
    driver: bridge
